<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="gear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a"/>
      <stop offset="100%" style="stop-color:#d4760e"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>
  <!-- Gear/settings icon -->
  <g transform="translate(128,120)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#gear)" stroke-width="8"/>
    <circle cx="0" cy="0" r="12" fill="url(#gear)"/>
    <!-- Gear teeth -->
    <g fill="url(#gear)">
      <rect x="-5" y="-48" width="10" height="16" rx="3"/>
      <rect x="-5" y="32" width="10" height="16" rx="3"/>
      <rect x="-48" y="-5" width="16" height="10" rx="3"/>
      <rect x="32" y="-5" width="16" height="10" rx="3"/>
      <rect x="24" y="-36" width="10" height="16" rx="3" transform="rotate(45)"/>
      <rect x="-34" y="20" width="10" height="16" rx="3" transform="rotate(45)"/>
      <rect x="20" y="24" width="16" height="10" rx="3" transform="rotate(45)"/>
      <rect x="-36" y="-34" width="16" height="10" rx="3" transform="rotate(45)"/>
    </g>
  </g>
  <!-- Color swatches -->
  <rect x="60" y="185" width="20" height="12" rx="3" fill="#ff5555"/>
  <rect x="86" y="185" width="20" height="12" rx="3" fill="#50fa7b"/>
  <rect x="112" y="185" width="20" height="12" rx="3" fill="#5555ff"/>
  <rect x="138" y="185" width="20" height="12" rx="3" fill="#f1fa8c"/>
  <rect x="164" y="185" width="20" height="12" rx="3" fill="#ff79c6"/>
  <!-- Text -->
  <text x="128" y="225" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#f7931a">crush</text>
  <text x="128" y="246" text-anchor="middle" font-family="monospace" font-size="12" fill="#666">rush config</text>
</svg>
